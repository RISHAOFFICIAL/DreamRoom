<svg width=\"600\" height=\"800\" viewBox=\"0 0 600 800\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\">
  <!-- Background -->
  <rect width=\"600\" height=\"800\" fill=\"#0E0C14\"/>
  
  <!-- Subtle Gradient for depth -->
  <defs>
    <radialGradient id=\"goldGrad\" cx=\"50%\" cy=\"50%\" r=\"50%\" fx=\"50%\" fy=\"50%\">
      <stop offset=\"0%\" style=\"stop-color:#E8C97A;stop-opacity:0.2\" />
      <stop offset=\"100%\" style=\"stop-color:#0E0C14;stop-opacity:0\" />
    </radialGradient>
  </defs>
  <rect width=\"600\" height=\"800\" fill=\"url(#goldGrad)\" opacity=\"0.5\"/>

  <!-- Border -->
  <rect x=\"20\" y=\"20\" width=\"560\" height=\"760\" fill=\"none\" stroke=\"#E8C97A\" stroke-width=\"1\" opacity=\"0.5\"/>
  <rect x=\"25\" y=\"25\" width=\"550\" height=\"750\" fill=\"none\" stroke=\"#E8C97A\" stroke-width=\"0.5\" opacity=\"0.2\"/>

  <!-- Title Section -->
  <text x=\"300\" y=\"80\" font-family=\"Cormorant Garamond, serif\" font-size=\"42\" fill=\"#E8C97A\" text-anchor=\"middle\" letter-spacing=\"2\">THE SANCTUARY PACK</text>
  <line x1=\"220\" y1=\"100\" x2=\"380\" y2=\"100\" stroke=\"#E8C97A\" stroke-width=\"1\"/>
  <text x=\"300\" y=\"135\" font-family=\"Cormorant Garamond, serif\" font-size=\"20\" fill=\"#5E8FA7\" text-anchor=\"middle\" font-style=\"italic\">Find your center. Build from peace.</text>

  <!-- Asset Previews -->
  <g transform=\"translate(50, 180)\">
    <!-- Main Cover Concept (Abstract placeholder for the feeling) -->
    <rect width=\"500\" height=\"300\" fill=\"#1A1721\" stroke=\"#E8C97A\" stroke-width=\"0.5\"/>
    <path d=\"M150 150 Q250 50 350 150 T450 150\" fill=\"none\" stroke=\"#E8C97A\" stroke-width=\"0.5\" opacity=\"0.3\"/>
    <text x=\"250\" y=\"150\" font-family=\"Cormorant Garamond, serif\" font-size=\"24\" fill=\"#E8C97A\" text-anchor=\"middle\" opacity=\"0.4\" font-style=\"italic\">A experience Space for Reflection</text>
    
    <!-- Thumbnail Assets -->
    <g transform=\"translate(0, 320)\">
      <!-- Linen Texture -->
      <g>
        <rect width=\"110\" height=\"110\" fill=\"#25212B\" stroke=\"#E8C97A\" stroke-width=\"0.5\"/>
        <text x=\"55\" y=\"125\" font-family=\"sans-serif\" font-size=\"10\" fill=\"#E8C97A\" text-anchor=\"middle\" letter-spacing=\"1\">ORGANIC LINEN</text>
      </g>
      
      <!-- Gold Fern -->
      <g transform=\"translate(130, 0)\">
        <rect width=\"110\" height=\"110\" fill=\"#25212B\" stroke=\"#E8C97A\" stroke-width=\"0.5\"/>
        <text x=\"55\" y=\"125\" font-family=\"sans-serif\" font-size=\"10\" fill=\"#E8C97A\" text-anchor=\"middle\" letter-spacing=\"1\">GOLD FOIL FERN</text>
      </g>
      
      <!-- Ceremonial Bowl -->
      <g transform=\"translate(260, 0)\">
        <rect width=\"110\" height=\"110\" fill=\"#25212B\" stroke=\"#E8C97A\" stroke-width=\"0.5\"/>
        <text x=\"55\" y=\"125\" font-family=\"sans-serif\" font-size=\"10\" fill=\"#E8C97A\" text-anchor=\"middle\" letter-spacing=\"1\">ZEN BOWL</text>
      </g>
      
      <!-- Grounding Symbol -->
      <g transform=\"translate(390, 0)\">
        <rect width=\"110\" height=\"110\" fill=\"#25212B\" stroke=\"#E8C97A\" stroke-width=\"0.5\"/>
        <text x=\"55\" y=\"125\" font-family=\"sans-serif\" font-size=\"10\" fill=\"#E8C97A\" text-anchor=\"middle\" letter-spacing=\"1\">SACRED SIGIL</text>
      </g>
    </g>
  </g>

  <!-- Description -->
  <foreignObject x=\"60\" y=\"650\" width=\"480\" height=\"80\">
    <div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"color: #E0E0E0; font-family: 'Cormorant Garamond', serif; font-size: 18px; line-height: 1.5; text-align: center;\">
      Step into the stillness. This pack grants you tactile organic textures, gold-etched botanicals, and the exclusive <strong>'Temple Silence'</strong> ambient soundscape.
    </div>
  </foreignObject>

  <!-- CTA Button -->
  <g transform=\"translate(200, 720)\">
    <rect width=\"200\" height=\"50\" rx=\"25\" fill=\"#E8C97A\"/>
    <text x=\"100\" y=\"32\" font-family=\"Cormorant Garamond, serif\" font-size=\"22\" fill=\"#0E0C14\" text-anchor=\"middle\" font-weight=\"bold\">UNLOCK $3.99</text>
  </g>
</svg>